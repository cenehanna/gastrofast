<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація — GastroFast</title>
    <link rel="stylesheet" href="style.css">
</head>

<body
    style="background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
    <div
        style="width: 100%; max-width: 420px; background: #fff; border-radius: 20px; padding: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.08);">
        <h1 style="font-size: 2rem; color: #2c3e50; margin-bottom: 20px; text-align: center;">Реєстрація</h1>

        <div id="register-error" style="color: #e74c3c; margin-bottom: 15px; min-height: 22px;"></div>
        <div id="register-success" style="color: #2ecc71; margin-bottom: 15px; min-height: 22px;"></div>

        <form id="register-form" onsubmit="registerUser(event)"
            style="display: flex; flex-direction: column; gap: 15px;">
            <label style="font-weight: 600;">Ваше ім'я:</label>
            <input id="register-name" type="text" placeholder="Іван" required
                style="padding: 14px; border-radius: 12px; border: 1px solid #dcdcdc; outline: none;">

            <label style="font-weight: 600;">Email:</label>
            <input id="register-email" type="email" placeholder="ivan@mail.com" required
                style="padding: 14px; border-radius: 12px; border: 1px solid #dcdcdc; outline: none;">

            <label style="font-weight: 600;">Телефон:</label>
            <input id="register-phone" type="tel" placeholder="+380XXXXXXXXX" required
                style="padding: 14px; border-radius: 12px; border: 1px solid #dcdcdc; outline: none;">

            <label style="font-weight: 600;">Пароль:</label>
            <input id="register-password" type="password" placeholder="••••••••" required
                style="padding: 14px; border-radius: 12px; border: 1px solid #dcdcdc; outline: none;">

            <button type="submit"
                style="background: #ff5722; color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer;">Зареєструватися</button>
        </form>

        <p style="margin-top: 20px; text-align: center; color: #7f8c8d;">
            Вже маєте акаунт? <a href="login.html"
                style="color: #ff5722; font-weight: 700; text-decoration: none;">Увійти</a>
        </p>
    </div>
    <script src="script.js"></script>
</body>

</html>
