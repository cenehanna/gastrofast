<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Відстеження замовлення — GastroFast</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .track-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        .order-status {
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }

        .status-placed {
            background: #fdcb6e;
        }

        .status-cooking {
            background: #f39c12;
            color: white;
        }

        .status-done {
            background: #00b894;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
        }

        .btn-home {
            background: #ff5722;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }

        .info-row {
            margin: 10px 0;
            padding: 8px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <header>
        <div class="header-container">
            <h2 onclick="window.location.href='index.html'" style="cursor:pointer;">🍕 GastroFast</h2>
            <p>Відстеження замовлення</p>
        </div>
    </header>

    <main>
        <div class="track-container">
            <h1>📦 Статус вашого замовлення</h1>
            <div id="order-info" class="loading">
                ⏳ Завантаження інформації про замовлення...
            </div>
            <button class="btn-home" onclick="window.location.href='index.html'">
                🍽️ На головну
            </button>
        </div>
    </main>

<script>
    async function trackOrder() {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const orderInfo = document.getElementById('order-info');

        if (!token) {
            orderInfo.innerHTML = `
      <div style="color: red; padding: 20px;">
        ❌ Токен замовлення не знайдено.
      </div>
    `;
            return;
        }

        try {
            const response = await fetch(`https://gastrofast.onrender.com/orders/track?token=${token}`);

            if (!response.ok) {
                throw new Error('Замовлення не знайдено');
            }

            const order = await response.json();

            let statusClass = '';
            let statusText = '';
            let statusEmoji = '';

            switch (order.status) {
                case 'PENDING':
                    statusText = 'В обробці';
                    statusClass = 'status-placed';
                    statusEmoji = '⏳';
                    break;
                case 'PLACED':
                    statusText = 'Прийнято';
                    statusClass = 'status-confirmed';
                    statusEmoji = '📋';
                    break;
                case 'COOKING':
                    statusText = 'Готується';
                    statusClass = 'status-cooking';
                    statusEmoji = '🍳';
                    break;
                case 'DELIVERED':
                    statusText = 'Доставляється';
                    statusClass = 'status-delivering';
                    statusEmoji = '🚚';
                    break;
                case 'DONE':
                    statusText = 'Виконано';
                    statusClass = 'status-done';
                    statusEmoji = '✅';
                    break;
                case 'CANCELLED':
                    statusText = 'Скасовано';
                    statusClass = 'status-cancelled';
                    statusEmoji = '❌';
                    break;
                default:
                    statusText = order.status || 'В обробці';
                    statusClass = 'status-placed';
                    statusEmoji = '⏳';
            }

            // Тепер тут будуть ПОВНІ НАЗВИ страв
            let itemSummary = '';
            if (order.items && order.items.length > 0) {
                itemSummary = order.items.map(item => {
                    return `${item.name} x${item.quantity} — ${item.price} грн`;
                }).join('<br>');
            } else {
                itemSummary = '-';
            }

            const orderDate = new Date(order.createdAt).toLocaleString('uk-UA');

            orderInfo.innerHTML = `
      <div class="order-status ${statusClass}">
        <h2 style="text-align: center;">${statusEmoji} ${statusText}</h2>
        
        <div class="info-row">
          <strong>📋 Номер замовлення:</strong> #${order.id}
        </div>
        
        <div class="info-row">
          <strong>📅 Дата:</strong> ${orderDate}
        </div>
        
        <div class="info-row">
          <strong>🍽️ Страви:</strong><br>
          ${itemSummary}
        </div>
        
        <div class="info-row">
          <strong>💰 Сума:</strong> ${order.total} грн
        </div>
        
        <div class="info-row">
          <strong>📍 Адреса доставки:</strong> ${order.address || 'Не вказано'}
        </div>
        
        <div class="info-row">
          <strong>👤 Контактна особа:</strong> ${order.clientName}
        </div>
        
        <div class="info-row">
          <strong>📞 Телефон:</strong> ${order.clientPhone}
        </div>
      </div>
    `;
        } catch (error) {
            console.error('Помилка:', error);
            orderInfo.innerHTML = `
      <div style="color: red; padding: 20px;">
        ❌ ${error.message}
      </div>
    `;
        }
    }

    trackOrder();
</script>
</body>

</html>
